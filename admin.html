<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - 360 Virtual Exhibition</title>
  
  <!-- Pannellum CSS & JS สำหรับแสดงผลพรีวิว 360 องศา -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Chakra Petch', sans-serif; }
    /* กล่องพรีวิว 360 */
    #panorama-preview {
      width: 100%;
      height: 400px;
      border-radius: 0.5rem;
      background: #e5e7eb;
      position: relative;
    }
  </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- คอลัมน์ซ้าย: จัดการห้อง -->
    <div class="md:col-span-1 space-y-6">
      <div class="bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">จัดการนิทรรศการ 360°</h1>
        
        <!-- 1. สร้างห้องใหม่ -->
        <div class="mb-4">
          <h2 class="text-lg font-semibold mb-2 bg-blue-100 p-2 rounded">1. สร้างห้องใหม่</h2>
          <input type="text" id="roomName" placeholder="ชื่อห้องนิทรรศการ" class="w-full p-2 border rounded mb-2">
          <input type="file" id="imageUpload" accept="image/*" class="w-full p-2 border rounded mb-2 text-sm">
          <button id="uploadBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 w-full transition shadow">อัปโหลดและสร้างห้อง</button>
          <p id="uploadStatus" class="text-sm text-gray-500 mt-2"></p>
        </div>
      </div>

      <!-- กล่องแสดงลิงก์และลบห้อง -->
      <div class="bg-white p-6 rounded-lg shadow-lg">
        <h2 class="text-lg font-semibold mb-2 bg-purple-100 p-2 rounded text-purple-800">แชร์ / จัดการห้อง</h2>
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-1">แชร์ลิงก์เข้าห้องนี้โดยตรง:</label>
          <input type="text" id="shareLink" readonly class="w-full p-2 border rounded bg-gray-100 text-sm mb-2" onclick="this.select()">
        </div>
        <button id="deleteRoomBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 w-full transition shadow hidden">ลบห้องนี้ทิ้งทั้งหมด</button>
      </div>
    </div>

    <!-- คอลัมน์ขวา: พรีวิว และ จุดมาร์ค -->
    <div class="md:col-span-2 space-y-6">
      
      <!-- เลือกห้อง และ พรีวิว -->
      <div class="bg-white p-6 rounded-lg shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-lg font-semibold">2. เลือกห้องที่ต้องการแก้ไข</h2>
        </div>
        <select id="roomSelector" class="w-full p-2 border rounded mb-4 text-lg font-bold text-blue-700 bg-blue-50">
          <option value="">-- กำลังโหลดข้อมูลห้อง --</option>
        </select>

        <h2 class="text-lg font-semibold mb-2">พรีวิว 360° (เลื่อนเป้าศูนย์กลางเพื่อหาพิกัด)</h2>
        <div id="panorama-preview">
          <!-- เป้าศูนย์เล็ง (Crosshair) -->
          <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-white text-3xl font-bold pointer-events-none drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] z-10">+</div>
        </div>
        <button id="getPitchYawBtn" class="mt-4 bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-600 w-full font-bold shadow">ดึงพิกัดจากเป้าเล็ง (Center)</button>
        <div class="text-center mt-2 text-sm text-gray-600">
          พิกัดปัจจุบัน: Pitch <span id="displayPitch" class="font-bold text-black">0</span>, Yaw <span id="displayYaw" class="font-bold text-black">0</span>
        </div>
      </div>

      <!-- ฟอร์มสร้าง/แก้ไขจุดมาร์ค -->
      <div class="bg-white p-6 rounded-lg shadow-lg">
        <h2 class="text-lg font-semibold mb-4 bg-green-100 p-2 rounded text-green-800">3. เพิ่ม/แก้ไขจุดมาร์ค (Hotspot)</h2>
        
        <!-- ซ่อน Input พิกัดไว้ใช้ส่งค่า -->
        <input type="hidden" id="pitch">
        <input type="hidden" id="yaw">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold mb-1">ประเภทจุดมาร์ค</label>
            <select id="mediaType" class="w-full p-2 border rounded bg-gray-50">
              <option value="info">ข้อความ / รูปภาพ (Popup)</option>
              <option value="embed">จอทีวีฝังในห้อง (YouTube เล่นอัตโนมัติ)</option>
              <option value="link">เชื่อมโยงไปยังห้องอื่น (ประตูมิติ)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1">ชื่อมาร์ค (Hover text)</label>
            <input type="text" id="hsTitle" placeholder="เช่น รูปภาพประวัติศาสตร์" class="w-full p-2 border rounded bg-gray-50">
          </div>
        </div>

        <div id="targetRoomContainer" class="hidden">
          <label class="block text-sm font-semibold mb-1">เลือกห้องปลายทาง (วาร์ปไปไหน)</label>
          <select id="targetRoomId" class="w-full p-2 border rounded mb-3 bg-gray-50"></select>
        </div>

        <div id="contentContainer">
          <label class="block text-sm font-semibold mb-1">รายละเอียด หรือ URL รูป/วิดีโอ</label>
          <textarea id="mediaContent" rows="3" placeholder="ข้อความยาวๆ, URL รูป, หรือ URL Youtube" class="w-full p-2 border rounded mb-3 bg-gray-50"></textarea>
        </div>

        <div class="flex gap-2">
          <button id="addHotspotBtn" class="bg-green-500 text-white font-semibold px-4 py-2 rounded hover:bg-green-600 w-full transition shadow">บันทึกจุดมาร์ค</button>
          <button id="cancelEditBtn" class="hidden bg-gray-500 text-white font-semibold px-4 py-2 rounded hover:bg-gray-600 w-1/3 transition shadow">ยกเลิก</button>
        </div>
        <p id="hsStatus" class="text-sm text-green-600 mt-2 text-center"></p>

        <!-- รายการจุดมาร์ค -->
        <div class="mt-6 border-t border-gray-200 pt-4">
          <h3 class="text-md font-bold text-gray-700 mb-3">📌 รายการจุดมาร์คในห้องนี้</h3>
          <div id="hotspotsList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
            <!-- รายการจะถูกสร้างด้วย JS -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5o9aY3La7nK7gCHbjM2ToolmnoE0y-is",
      authDomain: "post-it-kk-election.firebaseapp.com",
      databaseURL: "https://post-it-kk-election-default-rtdb.firebaseio.com",
      projectId: "post-it-kk-election",
      storageBucket: "post-it-kk-election.firebasestorage.app",
      messagingSenderId: "323275742590",
      appId: "1:323275742590:web:a491412b699c919146672f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let viewer = null;
    let currentRooms = {};
    let editingHotspotId = null;

    // 1. ดึงข้อมูลห้องทั้งหมดมาใส่ Dropdown
    onValue(ref(db, 'exhibition_rooms'), (snapshot) => {
      currentRooms = snapshot.val() || {};
      const selector = document.getElementById('roomSelector');
      const targetSelector = document.getElementById('targetRoomId');
      
      const currentSelection = selector.value;
      selector.innerHTML = '<option value="">-- เลือกห้องที่ต้องการแก้ไข --</option>';
      targetSelector.innerHTML = '<option value="">-- เลือกห้องปลายทาง --</option>';

      Object.keys(currentRooms).forEach(roomId => {
        const name = currentRooms[roomId].name;
        selector.innerHTML += `<option value="${roomId}">${name}</option>`;
        targetSelector.innerHTML += `<option value="${roomId}">${name}</option>`;
      });

      if(currentSelection && currentRooms[currentSelection]) {
        selector.value = currentSelection;
      }
    });

    // 2. เมื่อเลือกห้อง ให้โหลดภาพ 360 ขึ้นมาพรีวิว และโหลดรายการมาร์ค
    document.getElementById('roomSelector').addEventListener('change', (e) => {
      const roomId = e.target.value;
      if(viewer) viewer.destroy(); // ลบวิวเก่าทิ้งก่อน
      
      resetForm(); // เคลียร์ฟอร์มเผื่อค้างอยู่

      const delBtn = document.getElementById('deleteRoomBtn');

      if(!roomId) {
        document.getElementById('hotspotsList').innerHTML = '';
        document.getElementById('shareLink').value = '';
        delBtn.classList.add('hidden');
        return;
      }

      const room = currentRooms[roomId];
      delBtn.classList.remove('hidden');

      // สร้างลิงก์สำหรับแชร์ (แก้ปัญหา URL 404)
      let currentUrl = window.location.href;
      // ตัดคำว่า admin.html (ถ้ามี) แล้วแทนที่ด้วย index.html
      let baseUrl = currentUrl.replace(/\/[^\/]*$/, '/index.html'); 
      if (!currentUrl.includes('/')) {
        baseUrl = 'index.html'; // กรณีเปิดรันไฟล์เฉยๆ
      }
      document.getElementById('shareLink').value = `${baseUrl}?room=${roomId}`;

      // แปลง Hotspots เดิมมาแสดงในพรีวิว
      const hotSpotsDisplay = [];
      if(room.hotspots) {
        Object.values(room.hotspots).forEach(hs => {
          hotSpotsDisplay.push({
            pitch: hs.pitch, yaw: hs.yaw,
            type: "info",
            text: hs.text || (hs.type === 'link' ? "ลิงก์วาร์ป" : "มาร์ค")
          });
        });
      }

      // โหลดรายการลงลิสต์
      renderHotspotList(roomId, room.hotspots);

      viewer = pannellum.viewer('panorama-preview', {
        type: "equirectangular",
        panorama: room.imageUrl,
        autoLoad: true,
        hfov: 100, // ปรับมุมกล้องให้ภาพไม่บิดเบี้ยว
        hotSpots: hotSpotsDisplay
      });
    });

    // ฟังก์ชันเคลียร์ฟอร์ม
    function resetForm() {
      editingHotspotId = null;
      document.getElementById('hsTitle').value = "";
      document.getElementById('mediaContent').value = "";
      document.getElementById('addHotspotBtn').innerText = "บันทึกจุดมาร์ค";
      document.getElementById('addHotspotBtn').classList.replace('bg-yellow-500', 'bg-green-500');
      document.getElementById('addHotspotBtn').classList.replace('hover:bg-yellow-600', 'hover:bg-green-600');
      document.getElementById('cancelEditBtn').classList.add('hidden');
    }

    document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

    // ฟังก์ชันเรนเดอร์รายการจุดมาร์ค
    function renderHotspotList(roomId, hotspots) {
      const list = document.getElementById('hotspotsList');
      list.innerHTML = '';
      if (!hotspots) {
        list.innerHTML = '<p class="text-sm text-gray-500 text-center py-2">ยังไม่มีจุดมาร์คในห้องนี้</p>';
        return;
      }

      Object.entries(hotspots).forEach(([hsId, hs]) => {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-white p-2 rounded border border-gray-200 text-sm shadow-sm';
        
        const info = document.createElement('div');
        let typeIcon = hs.type === 'link' ? '🚪' : hs.type === 'embed' ? '📺' : 'ℹ️';
        info.innerHTML = `<strong>${typeIcon} ${hs.text || 'ไม่มีชื่อ'}</strong> <br><span class="text-xs text-gray-500">Pitch: ${hs.pitch.toFixed(1)}, Yaw: ${hs.yaw.toFixed(1)}</span>`;
        
        const actions = document.createElement('div');
        actions.className = 'flex gap-2';
        
        const editBtn = document.createElement('button');
        editBtn.className = 'text-blue-600 hover:text-blue-800 font-bold px-2';
        editBtn.innerText = 'แก้ไข';
        editBtn.onclick = () => {
          editingHotspotId = hsId;
          document.getElementById('pitch').value = hs.pitch;
          document.getElementById('yaw').value = hs.yaw;
          document.getElementById('displayPitch').innerText = hs.pitch.toFixed(2);
          document.getElementById('displayYaw').innerText = hs.yaw.toFixed(2);
          
          document.getElementById('mediaType').value = hs.type;
          document.getElementById('mediaType').dispatchEvent(new Event('change'));
          
          document.getElementById('hsTitle').value = hs.text || '';
          if(hs.type === 'link') {
            document.getElementById('targetRoomId').value = hs.targetRoomId || '';
          } else {
            document.getElementById('mediaContent').value = hs.content || '';
          }
          
          document.getElementById('addHotspotBtn').innerText = 'บันทึกการแก้ไข';
          
          // เปลี่ยนปุ่มเป็นสีเหลืองเมื่อแก้ไข
          if(document.getElementById('addHotspotBtn').classList.contains('bg-green-500')) {
            document.getElementById('addHotspotBtn').classList.replace('bg-green-500', 'bg-yellow-500');
            document.getElementById('addHotspotBtn').classList.replace('hover:bg-green-600', 'hover:bg-yellow-600');
          }
          
          document.getElementById('cancelEditBtn').classList.remove('hidden');

          if(viewer) {
            viewer.setPitch(hs.pitch);
            viewer.setYaw(hs.yaw);
          }
        };

        const delBtn = document.createElement('button');
        delBtn.className = 'text-red-600 hover:text-red-800 font-bold px-2';
        delBtn.innerText = 'ลบ';
        delBtn.onclick = async () => {
          if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบจุดมาร์คนี้?')) {
            try {
              await remove(ref(db, `exhibition_rooms/${roomId}/hotspots/${hsId}`));
              document.getElementById('roomSelector').dispatchEvent(new Event('change'));
            } catch (err) {
              alert("ลบไม่สำเร็จ!");
            }
          }
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        div.appendChild(info);
        div.appendChild(actions);
        list.appendChild(div);
      });
    }

    // สลับฟอร์มตามประเภทจุดมาร์ค
    document.getElementById('mediaType').addEventListener('change', (e) => {
      if(e.target.value === 'link') {
        document.getElementById('targetRoomContainer').classList.remove('hidden');
        document.getElementById('contentContainer').classList.add('hidden');
      } else {
        document.getElementById('targetRoomContainer').classList.add('hidden');
        document.getElementById('contentContainer').classList.remove('hidden');
      }
    });

    // ปุ่มดึงพิกัดจากหน้าจอ 360
    document.getElementById('getPitchYawBtn').addEventListener('click', () => {
      if(!viewer) return alert("กรุณาเลือกห้องก่อน");
      const pitch = viewer.getPitch();
      const yaw = viewer.getYaw();
      
      document.getElementById('pitch').value = pitch;
      document.getElementById('yaw').value = yaw;
      document.getElementById('displayPitch').innerText = pitch.toFixed(2);
      document.getElementById('displayYaw').innerText = yaw.toFixed(2);
    });

    // ปุ่มบันทึก/อัปเดต จุดมาร์ค
    document.getElementById('addHotspotBtn').addEventListener('click', async () => {
      const roomId = document.getElementById('roomSelector').value;
      const type = document.getElementById('mediaType').value;
      const pitch = document.getElementById('pitch').value;
      const yaw = document.getElementById('yaw').value;
      const text = document.getElementById('hsTitle').value;
      
      if (!roomId) return alert("กรุณาเลือกห้องก่อน");
      if (!pitch || !yaw) return alert("กรุณากดปุ่ม 'ดึงพิกัดจากเป้าเล็ง' ก่อน");
      
      const hotspotData = { type, pitch: parseFloat(pitch), yaw: parseFloat(yaw), text };

      if (type === 'link') {
        const targetId = document.getElementById('targetRoomId').value;
        if(!targetId) return alert("กรุณาเลือกห้องปลายทาง");
        hotspotData.targetRoomId = targetId;
      } else {
        hotspotData.content = document.getElementById('mediaContent').value;
      }

      try {
        if (editingHotspotId) {
          // โหมดแก้ไข
          const hsRef = ref(db, `exhibition_rooms/${roomId}/hotspots/${editingHotspotId}`);
          await set(hsRef, hotspotData); 
          document.getElementById('hsStatus').innerText = "อัปเดตจุดมาร์คเรียบร้อย!";
        } else {
          // โหมดเพิ่มใหม่
          const newHsRef = push(ref(db, `exhibition_rooms/${roomId}/hotspots`));
          await set(newHsRef, hotspotData);
          document.getElementById('hsStatus').innerText = "เพิ่มจุดมาร์คเรียบร้อย!";
        }
        
        setTimeout(() => { document.getElementById('hsStatus').innerText = ""; }, 3000);
        
        resetForm();
        // โหลดวิวใหม่เพื่อให้จุดอัปเดต
        document.getElementById('roomSelector').dispatchEvent(new Event('change'));

      } catch (err) {
        alert("เกิดข้อผิดพลาด");
        console.error(err);
      }
    });

    // ปุ่มลบห้อง
    document.getElementById('deleteRoomBtn').addEventListener('click', async () => {
      const roomId = document.getElementById('roomSelector').value;
      if(!roomId) return;
      if(confirm('🚨 คำเตือน: คุณแน่ใจหรือไม่ว่าต้องการลบห้องนี้? ข้อมูลและจุดมาร์คทั้งหมดในห้องนี้จะหายไปแบบกู้คืนไม่ได้!')) {
        try {
          await remove(ref(db, `exhibition_rooms/${roomId}`));
          alert('ลบห้องเรียบร้อยแล้ว');
          document.getElementById('roomSelector').value = "";
          document.getElementById('roomSelector').dispatchEvent(new Event('change'));
        } catch (error) {
          alert('เกิดข้อผิดพลาดในการลบห้อง: ' + error);
        }
      }
    });

    // อัปโหลดขึ้น Cloudinary
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const file = document.getElementById('imageUpload').files[0];
      const roomName = document.getElementById('roomName').value;
      if (!file || !roomName) return alert("กรุณาใส่ชื่อห้องและเลือกไฟล์");

      const status = document.getElementById('uploadStatus');
      status.innerText = "กำลังอัปโหลดรูปไปยัง Cloudinary... (อาจใช้เวลาสักครู่)";
      document.getElementById('uploadBtn').disabled = true;
      document.getElementById('uploadBtn').classList.add('opacity-50');

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', 'khonkaen_preset'); // ใช้ Preset ที่ผู้ใช้ให้มา

      try {
        const res = await fetch('https://api.cloudinary.com/v1_1/dk0ypev4m/image/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        if (data.error) {
           throw new Error(data.error.message);
        }

        // บันทึกข้อมูลห้องลง Firebase
        const roomRef = push(ref(db, 'exhibition_rooms'));
        await set(roomRef, {
          name: roomName,
          imageUrl: data.secure_url,
          hotspots: [] 
        });
        
        status.innerHTML = `<span class="text-green-600 font-bold">สร้างห้องสำเร็จ! สามารถเลือกห้องจากเมนูด้านขวาได้เลย</span>`;
        document.getElementById('roomName').value = "";
        document.getElementById('imageUpload').value = "";
      } catch (err) {
        status.innerHTML = `<span class="text-red-500">เกิดข้อผิดพลาด: ${err.message}</span>`;
        console.error(err);
      } finally {
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadBtn').classList.remove('opacity-50');
      }
    });

  </script>
</body>
</html>
