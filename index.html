<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Virtual Exhibition</title>
  
  <!-- Tailwind & Font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Pannellum -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  
  <style>
    body { font-family: 'Chakra Petch', sans-serif; margin: 0; overflow: hidden; background: #000; }
    #panorama { width: 100vw; height: 100vh; }
    
    /* Loading UI */
    #loadingScreen {
      position: absolute; inset: 0; z-index: 100;
      background: #111; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: white;
    }

    /* 
      การตกแต่งจุดมาร์ค (Hotspot) แบบกำหนดเอง 
      **สำคัญ**: ห้ามใช้ transform ในการทำ Animation เด็ดขาด เพราะจะไปตีกับการคำนวณตำแหน่งของ Pannellum
    */
    .custom-hotspot {
      width: 32px;
      height: 32px;
      background-color: rgba(59, 130, 246, 0.85); /* สีฟ้า Tailwind */
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      animation: pulseGlow 2s infinite;
      transition: background-color 0.3s;
    }

    .custom-hotspot:hover {
      background-color: rgba(239, 68, 68, 0.9); /* เปลี่ยนเป็นสีแดงเมื่อเอาเมาส์ชี้ */
    }

    /* อนิเมชันเรืองแสง แทนการเด้งขึ้นลง */
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }

    /* สำหรับปุ่มลิงก์ข้ามห้อง (ประตูวาร์ป สีเขียว) */
    .link-hotspot {
      background-color: rgba(16, 185, 129, 0.85); /* สีเขียว Tailwind */
      animation: pulseLinkGlow 2s infinite;
    }
    .link-hotspot:hover {
      background-color: rgba(5, 150, 105, 0.9);
    }
    @keyframes pulseLinkGlow {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Tooltip ข้อความที่โผล่มาตอนชี้จุดมาร์ค */
    .custom-tooltip span {
      visibility: hidden;
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%); /* ใช้ transform ในลูกได้ เพราะไม่ใช่ตัวหลักที่ Pannellum คุม */
      background-color: rgba(0, 0, 0, 0.8);
      color: #fff;
      text-align: center;
      padding: 6px 12px;
      border-radius: 6px;
      white-space: nowrap;
      font-size: 14px;
      pointer-events: none;
    }
    .custom-hotspot:hover span {
      visibility: visible;
    }

    /* Container สำหรับจอวิดีโอ Youtube ฝังใน 360 */
    .embed-video-hotspot {
      width: 480px; /* ขนาดความกว้างจอภาพ (ปรับได้) */
      height: 270px; /* อัตราส่วน 16:9 */
      transform: translate(-50%, -50%);
      pointer-events: auto; /* เปิดให้สามารถคลิกเล่น/หยุดวิดีโอได้ */
    }
    .embed-video-hotspot iframe {
      width: 100%; height: 100%; 
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      border: 4px solid #222;
      background: #000;
    }
  </style>
</head>
<body>

  <!-- จอโหลดดิง -->
  <div id="loadingScreen">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-4"></div>
    <h2 class="text-2xl font-bold">กำลังโหลดนิทรรศการ...</h2>
  </div>

  <!-- จุดแสดงผล 360 -->
  <div id="panorama"></div>

  <!-- Modal สำหรับแสดงเนื้อหา Popup -->
  <div id="mediaModal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center z-50 p-4 transition-opacity duration-300">
    <div class="bg-white rounded-lg max-w-2xl w-full p-6 relative shadow-2xl">
      <!-- ปุ่มปิด -->
      <button id="closeModal" class="absolute top-3 right-4 text-3xl font-bold text-gray-400 hover:text-red-500 transition">&times;</button>
      
      <h2 id="modalTitle" class="text-2xl font-bold text-blue-700 mb-4 pr-8 border-b pb-2"></h2>
      
      <!-- พื้นที่แสดงเนื้อหา (รูป/วิดีโอ/ข้อความ) -->
      <div id="modalBody" class="mt-4 overflow-y-auto max-h-[60vh]"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    // ตั้งค่า Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD5o9aY3La7nK7gCHbjM2ToolmnoE0y-is",
      authDomain: "post-it-kk-election.firebaseapp.com",
      databaseURL: "https://post-it-kk-election-default-rtdb.firebaseio.com",
      projectId: "post-it-kk-election",
      storageBucket: "post-it-kk-election.firebasestorage.app",
      messagingSenderId: "323275742590",
      appId: "1:323275742590:web:a491412b699c919146672f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let viewer = null;

    // อ่านค่าจาก URL เช่น ?room=-O123456
    const urlParams = new URLSearchParams(window.location.search);
    const targetRoomId = urlParams.get('room');

    // ดึงข้อมูลจาก Firebase
    onValue(ref(db, 'exhibition_rooms'), (snapshot) => {
      const data = snapshot.val();
      if(data) {
        initExhibition(data);
      } else {
        document.getElementById('loadingScreen').innerHTML = "<h2 class='text-xl text-red-400'>ไม่พบข้อมูลนิทรรศการ</h2>";
      }
    });

    function initExhibition(roomsData) {
      const scenes = {};
      let firstScene = null;

      Object.keys(roomsData).forEach(roomId => {
        if(!firstScene) firstScene = roomId; // เก็บห้องแรกไว้เป็นค่าเริ่มต้น
        
        const room = roomsData[roomId];
        
        // สร้างฉากแต่ละห้อง
        scenes[roomId] = {
          type: "equirectangular",
          panorama: room.imageUrl,
          autoLoad: true,
          hfov: 100, /* ปรับมุมมองกล้องเริ่มต้นให้ซูมเข้าเล็กน้อย ช่วยให้ภาพดูคมชัดขึ้น */
          hotSpots: createHotspots(room.hotspots)
        };
      });

      // ถ้าใน URL มีระบุห้องเป้าหมาย และห้องนั้นมีอยู่จริง ให้เปิดห้องนั้นก่อน
      const startingScene = (targetRoomId && scenes[targetRoomId]) ? targetRoomId : firstScene;

      // ถ้ามี viewer เก่าอยู่ให้ลบทิ้งก่อน
      if(viewer) viewer.destroy();

      // ปิดหน้าโหลดดิ้ง
      document.getElementById('loadingScreen').style.display = 'none';

      // เริ่มทำงาน Pannellum
      viewer = pannellum.viewer('panorama', {
        default: {
          firstScene: startingScene,
          sceneFadeDuration: 1000 // เอฟเฟกต์เฟดตอนเปลี่ยนห้อง
        },
        scenes: scenes
      });
    }

    function createHotspots(hotspotsData) {
      if(!hotspotsData) return [];
      
      return Object.values(hotspotsData).map(hs => {
        // กรณีเป็นจุดเชื่อมโยงไปห้องอื่น
        if(hs.type === 'link') {
          return {
            pitch: hs.pitch, 
            yaw: hs.yaw,
            cssClass: "custom-hotspot custom-tooltip link-hotspot", /* ใช้คลาสสีเขียว */
            createTooltipFunc: hotspotTooltip,
            createTooltipArgs: { text: hs.text || "ไปยังห้องถัดไป" },
            clickHandlerFunc: function(evt, args) {
              viewer.loadScene(args.sceneId); /* สั่งเปลี่ยนห้อง */
            },
            clickHandlerArgs: { sceneId: hs.targetRoomId }
          };
        }
        
        // กรณีเป็นจอทีวี Youtube ฝังใน 360 องศา (Embed)
        if(hs.type === 'embed') {
          return {
            pitch: hs.pitch, 
            yaw: hs.yaw,
            cssClass: "embed-video-hotspot",
            createTooltipFunc: function(hotSpotDiv, args) {
              // ดึง ID ของวิดีโอ
              let videoId = args.content.split('v=')[1] || args.content.split('/').pop();
              const ampersandPosition = videoId?.indexOf('&');
              if (ampersandPosition !== -1 && ampersandPosition !== undefined) {
                videoId = videoId.substring(0, ampersandPosition);
              }
              // สร้าง iFrame ฝัง Youtube (บังคับ Autoplay, Mute, Loop)
              hotSpotDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
              
              // ป้องกันบั๊กลากหน้าจอ 360 ไปด้วยตอนจิ้มหน้าจอวิดีโอ
              hotSpotDiv.addEventListener('mousedown', function(e) { e.stopPropagation(); });
              hotSpotDiv.addEventListener('touchstart', function(e) { e.stopPropagation(); });
            },
            createTooltipArgs: { content: hs.content }
          };
        }

        // กรณีเป็นสื่อ (Info) - ใช้ Custom HTML สร้างปุ่ม
        return {
          pitch: hs.pitch, 
          yaw: hs.yaw,
          cssClass: "custom-hotspot custom-tooltip",
          createTooltipFunc: hotspotTooltip,
          createTooltipArgs: { text: hs.text || "รายละเอียดเพิ่มเติม" },
          clickHandlerFunc: showMediaModal,
          clickHandlerArgs: { content: hs.content, text: hs.text }
        };
      });
    }

    // ฟังก์ชันสร้าง Tooltip ให้จุดมาร์ค
    function hotspotTooltip(hotSpotDiv, args) {
      hotSpotDiv.classList.add('custom-hotspot');
      var span = document.createElement('span');
      span.innerHTML = args.text;
      hotSpotDiv.appendChild(span);
    }

    // ระบบจัดการ Modal Popup
    const modal = document.getElementById('mediaModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    
    // ปิด Modal
    document.getElementById('closeModal').addEventListener('click', () => {
      modal.classList.add('hidden');
      modalBody.innerHTML = ''; // เคลียร์เนื้อหาเพื่อหยุดวิดีโอ
    });

    // ปิด Modal เมื่อคลิกพื้นที่ว่าง
    modal.addEventListener('click', (e) => {
      if(e.target === modal) {
        modal.classList.add('hidden');
        modalBody.innerHTML = '';
      }
    });

    // แสดงเนื้อหาเมื่อคลิกจุดมาร์ค
    function showMediaModal(evt, args) {
      modalTitle.innerText = args.text || "ข้อมูลเพิ่มเติม";
      const content = args.content || "";
      let html = "";

      // 1. ตรวจสอบว่าเป็นไฟล์รูปภาพหรือไม่
      if (content.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
        html = `<img src="${content}" class="w-full rounded shadow-md max-h-[60vh] object-contain">`;
      } 
      // 2. ตรวจสอบว่าเป็น URL ของ Youtube หรือไม่
      else if (content.includes('youtube.com') || content.includes('youtu.be')) {
        let videoId = content.split('v=')[1] || content.split('/').pop();
        const ampersandPosition = videoId.indexOf('&');
        if (ampersandPosition !== -1) {
          videoId = videoId.substring(0, ampersandPosition);
        }
        html = `<div class="aspect-w-16 aspect-h-9">
                  <iframe class="w-full h-64 md:h-96 rounded shadow-md" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>
                </div>`;
      } 
      // 3. ตรวจสอบว่าเป็นไฟล์ Video MP4
      else if (content.match(/\.(mp4|webm)$/i)) {
        html = `<video controls autoplay class="w-full rounded shadow-md"><source src="${content}"></video>`;
      } 
      // 4. ถ้าไม่ใช่ทั้งหมด ให้แสดงเป็นข้อความธรรมดา
      else {
        html = `<p class="text-gray-700 whitespace-pre-wrap leading-relaxed text-lg">${content}</p>`;
      }

      modalBody.innerHTML = html;
      modal.classList.remove('hidden');
    }
  </script>
</body>
</html>
